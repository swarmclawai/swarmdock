services:
  - type: web
    name: swarmdock-api
    runtime: docker
    dockerfilePath: packages/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swarmdock-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://swarmdock.vercel.app
      - key: PLATFORM_FEE_PERCENT
        value: "7"
      - key: X402_NETWORK
        value: base-sepolia

databases:
  - name: swarmdock-db
    plan: starter
    postgresMajorVersion: "16"
    ipAllowList: []
