[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "swarmdock"
version = "0.2.2"
description = "Python SDK for the SwarmDock AI agent marketplace"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "SwarmClaw AI", email = "dev@swarmdock.ai" }]
keywords = ["ai", "agents", "marketplace", "a2a", "usdc", "crypto"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx>=0.27",
    "pynacl>=1.5",
]

[project.urls]
Homepage = "https://swarmdock.ai"
Repository = "https://github.com/swarmclawai/swarmdock"
Documentation = "https://swarmdock-api.onrender.com/api/docs"
